# ============================================================
# app.yml — App Deployment Pipeline
# ============================================================
# THIS pipeline runs on every code push.
# It does NOT touch Terraform or infrastructure.
#
# Flow:
#   1. Build Docker image → push to DockerHub
#   2. Configure kubectl to talk to the existing EKS cluster
#   3. kubectl apply → rolls out the new image to pods
#
# The EKS cluster is assumed to already exist (created by infra.yml).
# ============================================================

name: App Pipeline — Build and Deploy to EKS

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'terraform/**'   # Ignore infra changes — that's infra.yml's job
      - 'README.md'

jobs:

  # ── JOB 1: Build and push Docker image ─────────────────────
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          # Tag with both 'latest' and the git commit SHA
          # The SHA tag means you can always roll back to an exact version
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/devops-app:latest
            ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.sha }}

  # ── JOB 2: Deploy to EKS ───────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build   # Only run after image is built and pushed

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      # This command tells kubectl how to connect to your EKS cluster.
      # It updates ~/.kube/config with the cluster credentials.
      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --region us-east-1 \
            --name devops-project3

      # Apply the manifests — Kubernetes will roll out the new image
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      # Update the image to the exact commit SHA
      # This forces a rollout even if the 'latest' tag didn't change
      - name: Update image to latest commit
        run: |
          kubectl set image deployment/devops-app \
            devops-app=${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.sha }}

      # Wait for the rollout to complete before declaring success
      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/devops-app --timeout=120s

      - name: Print deployment status
        run: |
          echo ""
          echo "---- Pods ----"
          kubectl get pods -l app=devops-app

          echo ""
          echo "---- Service ----"
          kubectl get service devops-app-service
